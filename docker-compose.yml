version: "3.8"

services:
  postgres:
    image: postgis/postgis:15-3.3 # PostgreSQL con soporte para búsqueda por ubicación
    container_name: leserva_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER} # Credenciales desde el .env
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432" # Permite conectarse desde TablePlus y el backend
    volumes:
      - postgres_data:/var/lib/postgresql/data # Los datos sobreviven reinicios

volumes:
  postgres_data:
